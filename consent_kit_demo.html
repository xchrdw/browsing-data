<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsentKit API Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: sans-serif;
            padding: 5px;
            margin: 0;
            background-color: #ffffff;
            color: #212529;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 10px;
        }
        h1 {
            font-size: 1.2rem;
            margin: 5px 0;
            text-align: center;
        }
        h2 {
            font-size: 1rem;
            margin: 5px 0;
        }
        h3 {
            font-size: 0.9rem;
            margin: 5px 0;
        }
        .status {
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .section {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #dee2e6;
        }
        .section:last-child {
            border-bottom: none;
        }
        button {
            padding: 8px 12px;
            margin: 3px;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }
        button:hover {
            background-color: #0056b3;
        }
        button.secondary {
            background-color: #6c757d;
        }
        button.secondary:hover {
            background-color: #5a6268;
        }
        input {
            padding: 6px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            width: 100%;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
        }
        .result-display {
            margin-left: 5px;
            font-style: italic;
            color: #6c757d;
            display: inline-block;
            margin-top: 3px;
            font-size: 0.9rem;
        }
        @media (max-width: 600px) {
            button {
                width: 100%;
                margin: 3px 0;
            }
            .result-display {
                display: block;
                margin-left: 0;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ConsentKit API Demo</h1>

        <div class="section">
            <h2>API Registration Status</h2>
            <div id="consentKitUiStatus" class="status checking">Checking consentKitUi...</div>
        </div>

        <div class="section">
            <h2>ConsentKit UI Actions</h2>
            
            <div>
                <h3>Actions</h3>
                <input type="text" id="resultInput" placeholder="Enter result (JSON/String)...">
                <button onclick="callCloseWithResult()">closeWithResult(result)</button>
                <button onclick="callSetResult()">setResult(result)</button>
            </div>

            <div>
                <h3>Capabilities</h3>
                <button class="secondary" onclick="callIsCloseWithResultSupported()">isCloseWithResultSupported()</button>
                <span id="isCloseWithResultSupportedResult" class="result-display"></span>
                <br>
                <button class="secondary" onclick="callIsSetResultSupported()">isSetResultSupported()</button>
                <span id="isSetResultSupportedResult" class="result-display"></span>
            </div>


        </div>

    </div>

    <script>
        function updateStatus() {
            // Check consentKitUi
            const ckUi = window.consentKitUi;
            const ckUiStatus = document.getElementById('consentKitUiStatus');
            if (ckUi) {
                ckUiStatus.textContent = 'consentKitUi is REGISTERED';
                ckUiStatus.className = 'status success';
            } else {
                ckUiStatus.textContent = 'consentKitUi is NOT registered';
                ckUiStatus.className = 'status error';
            }

        }

        // Run check immediately and also periodically in case injection is delayed
        updateStatus();
        setInterval(updateStatus, 1000);

        // Helper to get the API object
        function getCkUi() {
            return window.consentKitUi;
        }

        // Functions for buttons
        function callCloseWithResult() {
            const api = getCkUi();
            const result = document.getElementById('resultInput').value;
            if (api && api.closeWithResult) {
                api.closeWithResult(result);
            } else {
                alert('closeWithResult() method not available');
            }
        }

        function callSetResult() {
            const api = getCkUi();
            const result = document.getElementById('resultInput').value;
            if (api && api.setResult) {
                api.setResult(result);
            } else {
                alert('setResult() method not available');
            }
        }

        function callIsCloseWithResultSupported() {
            const api = getCkUi();
            if (api && api.isCloseWithResultSupported) {
                const res = api.isCloseWithResultSupported();
                document.getElementById('isCloseWithResultSupportedResult').textContent = 'Returned: ' + res;
            } else {
                alert('isCloseWithResultSupported() method not available');
            }
        }

        function callIsSetResultSupported() {
            const api = getCkUi();
            if (api && api.isSetResultSupported) {
                const res = api.isSetResultSupported();
                document.getElementById('isSetResultSupportedResult').textContent = 'Returned: ' + res;
            } else {
                alert('isSetResultSupported() method not available');
            }
        }

    </script>
</body>
</html>
